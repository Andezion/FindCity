name: CityGame
description: "City Compass - угадай направление города по компасу"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_compass: ^0.8.0
  geolocator: ^12.0.0
  permission_handler: ^11.3.1
  provider: ^6.1.2
  http: ^1.2.2
  flutter_native_splash: ^2.4.4
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/photo1.png
  android: true
  ios: true

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/photo2.png"

